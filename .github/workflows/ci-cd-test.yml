name: CI/CD Test (release → build → deploy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ──────────────────────────────────────────────
  # RELEASE — semantic version bump (main only, runs first)
  # ──────────────────────────────────────────────
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"

      - name: Summary
        if: steps.release.outputs.released == 'true'
        run: |
          echo "### Released :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.release.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${{ steps.release.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (no release)
        if: steps.release.outputs.released != 'true'
        run: |
          echo "### No release needed :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "No version-bumping commits found since last release." >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # BUILD — PR: validate only / main: build (after release)
  # ──────────────────────────────────────────────
  build:
    if: always() && !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    needs: release
    runs-on: ubuntu-latest
    outputs:
      version-in-image: ${{ steps.version-check.outputs.version }}
      commit-sha: ${{ steps.version-check.outputs.sha }}
    steps:
      # On push: checkout latest main (includes version bump commit)
      # On PR: default checkout (PR merge ref)
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && 'main' || '' }}

      - name: Check version in code
        id: version-check
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHA=$(git rev-parse --short=7 HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "### Build :hammer:" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version in pyproject.toml** | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit SHA (HEAD)** | \`${SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger SHA** | \`${GITHUB_SHA::7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Event** | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Simulate Docker build
        run: |
          echo "Simulating: docker build --tag ci-test:$(git rev-parse --short=7 HEAD)"
          echo "Build completed successfully"

  # ──────────────────────────────────────────────
  # DEPLOY — main only (after build)
  # ──────────────────────────────────────────────
  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Simulate deploy
        run: |
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ needs.build.outputs.version-in-image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ needs.build.outputs.commit-sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "Simulating deploy with version ${{ needs.build.outputs.version-in-image }}"
          echo "Deploy completed successfully"
